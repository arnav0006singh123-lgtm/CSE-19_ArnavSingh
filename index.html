<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Result Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    padding:25px;
    width:400px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#eef5ff;
    border-radius:5px;
    display:none;
}

.result h3{
    margin-bottom:10px;
}

.pass{
    color:green;
    font-weight:bold;
}

.fail{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
    <h2>Student Result Calculator</h2>

    <input type="text" id="name" placeholder="Enter Student Name">

    <input type="number" id="m1" placeholder="Subject 1 Marks">
    <input type="number" id="m2" placeholder="Subject 2 Marks">
    <input type="number" id="m3" placeholder="Subject 3 Marks">
    <input type="number" id="m4" placeholder="Subject 4 Marks">
    <input type="number" id="m5" placeholder="Subject 5 Marks">

    <button onclick="calculateResult()">Calculate Result</button>

    <div class="result" id="resultBox">
        <h3>Result</h3>
        <p id="output"></p>
    </div>
</div>

<script>
function calculateResult() {

    let name = document.getElementById("name").value;

    let m1 = Number(document.getElementById("m1").value);
    let m2 = Number(document.getElementById("m2").value);
    let m3 = Number(document.getElementById("m3").value);
    let m4 = Number(document.getElementById("m4").value);
    let m5 = Number(document.getElementById("m5").value);

    if(name === "" || isNaN(m1) || isNaN(m2) || isNaN(m3) || isNaN(m4) || isNaN(m5)){
        alert("Please fill all fields.");
        return;
    }

    let total = m1 + m2 + m3 + m4 + m5;
    let percentage = (total / 500) * 100;

    let grade;

    if(percentage >= 90){
        grade = "A+";
    }
    else if(percentage >= 80){
        grade = "A";
    }
    else if(percentage >= 70){
        grade = "B";
    }
    else if(percentage >= 60){
        grade = "C";
    }
    else if(percentage >= 40){
        grade = "D";
    }
    else{
        grade = "Fail";
    }

    let status = percentage >= 40
        ? '<span class="pass">PASS</span>'
        : '<span class="fail">FAIL</span>';

    document.getElementById("resultBox").style.display = "block";

    document.getElementById("output").innerHTML = `
        <strong>Name:</strong> ${name}<br><br>
        <strong>Total Marks:</strong> ${total} / 500<br><br>
        <strong>Percentage:</strong> ${percentage.toFixed(2)}%<br><br>
        <strong>Grade:</strong> ${grade}<br><br>
        <strong>Status:</strong> ${status}
    `;
}
</script>

</body>
</html>
